<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Rufus GIF Preview</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0f0a1e;
      color: #e8e0f0;
      font-family: ui-monospace, monospace;
      padding: 32px;
    }
    h1 {
      font-size: 22px;
      color: #c9ff00;
      margin-bottom: 8px;
      letter-spacing: 0.05em;
    }
    .subtitle {
      font-size: 12px;
      color: rgba(232,224,240,0.4);
      margin-bottom: 40px;
    }
    h2 {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: rgba(232,224,240,0.5);
      margin: 32px 0 16px;
      border-bottom: 1px solid rgba(232,224,240,0.1);
      padding-bottom: 8px;
    }
    h2 span.count {
      color: rgba(232,224,240,0.3);
      font-size: 11px;
      margin-left: 6px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
    }
    .card {
      background: #1a1030;
      border: 1px solid rgba(110,52,140,0.4);
      border-radius: 10px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      display: block;
      background: #0f0a1e;
    }
    .card-body {
      padding: 10px 12px;
    }
    .card-id {
      font-size: 11px;
      color: #c9ff00;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-tags {
      font-size: 10px;
      color: rgba(232,224,240,0.35);
      margin-top: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
  </style>
</head>
<body>
  <h1>Rufus GIF Preview</h1>
  <p class="subtitle">Fetches live from GET /api/gifs — just reload to see changes</p>
  <div id="root"></div>

  <script>
    function renderSection(title, items) {
      const h2 = document.createElement('h2');
      h2.innerHTML = title + `<span class="count">${items.length}</span>`;
      document.getElementById('root').appendChild(h2);

      const grid = document.createElement('div');
      grid.className = 'grid';

      items.forEach(gif => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <img src="${gif.url}" alt="${gif.id}" loading="lazy" />
          <div class="card-body">
            <div class="card-id">${gif.id}</div>
            <div class="card-tags">${(gif.tags || []).join(' · ')}</div>
          </div>
        `;
        grid.appendChild(card);
      });

      document.getElementById('root').appendChild(grid);
    }

    fetch('/api/gifs')
      .then(r => r.json())
      .then(data => {
        if (data.intro?.length)   renderSection('Intro', data.intro);
        if (data.success?.length) renderSection('Success', data.success);
        if (data.fail?.length)    renderSection('Fail', data.fail);
      })
      .catch(err => {
        document.getElementById('root').innerHTML = `<p style="color:#ff6b6b">Failed to load gifs.json: ${err.message}</p>`;
      });
  </script>
</body>
</html>
